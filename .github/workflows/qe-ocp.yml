---
name: QE OCP Testing (Ubuntu-hosted)

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'tests/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/qe-ocp.yml'
      - '.github/workflows/qe.yml'
  workflow_dispatch:
  # Schedule a daily cron at midnight UTC
  schedule:
    - cron: '0 0 * * *'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  TEST_REPO: redhat-best-practices-for-k8s/certsuite
  CERTSUITE_REF: main
  ENABLE_CERTSUITE_MEMORY_LIMIT: true

jobs:
  build-and-store-binary:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          ref: ${{ github.sha }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Clone the certsuite repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          repository: ${{ env.TEST_REPO }}
          path: certsuite
          ref: ${{ env.CERTSUITE_REF }}

      - name: Extract dependent Pull Requests
        uses: depends-on/depends-on-action@826c144163ac67bf08347590a5f81afd45da63ca # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          extra-dirs: certsuite

      - name: Build the certsuite binary
        run: make build-certsuite-tool
        working-directory: certsuite

      - name: Upload certsuite binary as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: certsuite-binary
          path: certsuite/certsuite
          retention-days: 1
  qe-ocp-testing:
    runs-on: ubuntu-24.04
    needs: build-and-store-binary
    # Only run on PRs from the main repository, not from forks
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository && needs.build-and-store-binary.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        # Suites with -ocp suffix run only OCP-required tests
        # These suites require OpenShift-specific features like MCO, CatalogSources, or CPU pinning
        # K8S-compatible tests run on Kind (qe.yml) with -k8s suffix
        suite: [affiliatedcertification-ocp, performance-ocp, platformalteration1-ocp, platformalteration2-ocp, platformalteration3-ocp, platformalteration4-ocp]
    env:
      SHELL: /bin/bash
      KUBECONFIG: '/home/runner/.kube/config'
      PFLT_DOCKERCONFIG: '/home/runner/.docker/config'
      TEST_CERTSUITE_IMAGE_NAME: quay.io/redhat-best-practices-for-k8s/certsuite
      TEST_CERTSUITE_IMAGE_TAG: unstable
      DOCKER_CONFIG_DIR: '/home/runner/.docker/'
      SKIP_PRELOAD_IMAGES: true # Not needed for github-hosted runs
      # Enable infrastructure tolerations for better test reliability in CI environments
      ENABLE_INFRASTRUCTURE_TOLERATIONS: true

    steps:
      - name: Check Red Hat Status
        uses: palmsoftware/redhat-status@v0
        with:
          components: |
            api.openshift.com
            developers.redhat.com

      - name: Write temporary docker file
        run: |
          mkdir -p /home/runner/.docker
          touch ${PFLT_DOCKERCONFIG}
          echo '{ "auths": {} }' >> ${PFLT_DOCKERCONFIG}

      - name: Check out code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          ref: ${{ github.sha }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Disable default go problem matcher
        run: echo "::remove-matcher owner=go::"

      - name: Check for CRC Pull Secret
        id: check-secret
        run: |
          if [ -z "${{ secrets.CRC_PULL_SECRET }}" ]; then
            echo "❌ WARNING: CRC_PULL_SECRET is not available"
            echo "This is expected for:"
            echo "  - External pull requests from forks"
            echo "  - Repositories without the secret configured"
            echo ""
            echo "OCP cluster setup will be SKIPPED."
            echo "To run full OCP tests, ensure CRC_PULL_SECRET is set in repository secrets."
            echo "For more info: https://docs.github.com/en/actions/security-guides/encrypted-secrets"
            echo "has-secret=false" >> $GITHUB_OUTPUT
          else
            echo "✅ CRC_PULL_SECRET is available - proceeding with OCP cluster setup"
            echo "has-secret=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup up OCP cluster
        if: steps.check-secret.outputs.has-secret == 'true'
        uses: palmsoftware/quick-ocp@80090ce0d0ea039d76337704f4447078c0be1a93 # v0.0.29
        with:
          ocpPullSecret: $OCP_PULL_SECRET
          bundleCache: true
          waitForOperatorsReady: true
        env:
          OCP_PULL_SECRET: ${{ secrets.CRC_PULL_SECRET }}

      - name: Clone the certsuite repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          repository: ${{ env.TEST_REPO }}
          path: certsuite
          ref: ${{ env.CERTSUITE_REF }}

      - name: Download pre-built certsuite binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: certsuite-binary
          path: certsuite/
  
      - name: Make binary executable
        run: chmod +x certsuite/certsuite

      - name: Run the tests (against binary)
        if: steps.check-secret.outputs.has-secret == 'true'
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 150
          max_attempts: 3
          command: FEATURES=${{matrix.suite}} CERTSUITE_REPO_PATH=${GITHUB_WORKSPACE}/certsuite USE_BINARY=true DISABLE_INTRUSIVE_TESTS=true ENABLE_PARALLEL=false ENABLE_FLAKY_RETRY=true JOB_ID=${{github.run_id}} make test-features

      - name: Skip message for missing pull secret
        if: steps.check-secret.outputs.has-secret == 'false'
        run: |
          echo "⏭️  SKIPPED: OCP tests were skipped due to missing CRC_PULL_SECRET"
          echo "This is normal for external pull requests from forks."
          echo "The workflow completed successfully, but no OCP cluster tests were executed."
